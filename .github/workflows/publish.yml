name: Publish Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/chatting-app-server
  IMAGE_CLIENT: ghcr.io/${{ github.repository_owner }}/chatting-app-client

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in, no extra secret needed

      # ── Server image ─────────────────────────────────────────────────────────
      - name: Extract metadata for server image
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVER }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Client image ──────────────────────────────────────────────────────────
      - name: Extract metadata for client image
        id: client-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CLIENT }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ${{ steps.client-meta.outputs.tags }}
          labels: ${{ steps.client-meta.outputs.labels }}
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || 'http://localhost:3001' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
