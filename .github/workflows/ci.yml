name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint the React client ─────────────────────────────────────────────────────
  lint:
    name: Lint (client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true   # report issues in logs without failing the check

  # ── Verify server Docker image builds cleanly ─────────────────────────────────
  build-server:
    name: Docker build (server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false          # build only — no push on CI
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Verify client Docker image builds cleanly ─────────────────────────────────
  build-client:
    name: Docker build (client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false          # build only — no push on CI
          build-args: |
            VITE_SERVER_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
